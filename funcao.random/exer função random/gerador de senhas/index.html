<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const caracteres = "abcdefghijklmnopqrstuvwxyz"
        const numbers = "0123456789"
        const especiais = "@#$%&"
        let senha = ""

        for (let i = 0; i < 3; i++) {
            const pos = Math.floor(Math.random() * caracteres.length)
            const pos2 = Math.floor(Math.random() * numbers.length)
            const pos3 = Math.floor(Math.random() * especiais.length)

            senha += caracteres[pos]
            senha += numbers[pos2]
            senha += especiais[pos3]
            
        }
        document.write("Senha gerada: " + senha)
        //console.log("Senha gerada:", senha)
    </script>
    
</body>
</html>
