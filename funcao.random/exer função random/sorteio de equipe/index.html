<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let nomes = ["Davi", "Sarah", "Bianca", "Adrielly", "Mateus",
                    "Ana", "Carlos", "João", "Maria", "Pedro"];

        // embaralha
        nomes.sort(() => Math.random() - 0.5);

        // divide
        let equipe1 = nomes.slice(0, 5);
        let equipe2 = nomes.slice(5);

        console.log("Equipe 1:", equipe1);
        console.log("Equipe 2:", equipe2);
    </script>
    
</body>
</html>
