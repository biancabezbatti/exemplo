<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
let paes = ["Pão francês", "Pão de forma", "Pão integral", "Pão australiano"];
let carnes = ["Carne bovina", "Frango", "Hambúrguer", "Calabresa"];
let queijos = ["Mussarela", "Cheddar", "Prato", "Suíço"];
let bebidas = ["Refrigerante", "Suco", "Água", "Milkshake"];

// Função para sortear item
function sortearItem(lista) {
    let indice = Math.floor(Math.random() * lista.length);
    return lista[indice];
}

// Sorteio do combo
let pao = sortearItem(paes);
let carne = sortearItem(carnes);
let queijo = sortearItem(queijos);
let bebida = sortearItem(bebidas);

// Exibir resultado
console.log("Seu combo de hoje é: " + pao + " com " + carne + ", " + queijo + " e " + bebida);
</script>
</body>
</html>
